<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Favorite Yu-Gi-Oh! Cards</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        title: ['Cinzel', 'serif'],
                        body: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        ygo: {
                            dark: '#0f172a',
                            card: '#1e293b',
                            gold: '#fbbf24',
                            accent: '#3b82f6'
                        }
                    },
                    aspectRatio: {
                        card: '59 / 86',
                    }
                }
            }
        };
    </script>

    <style>
        body {
            background-color: #020617;
            background-image:
                radial-gradient(circle at 20% 20%, rgba(99, 102, 241, 0.16), transparent 38%),
                radial-gradient(circle at 80% 30%, rgba(59, 130, 246, 0.14), transparent 40%),
                radial-gradient(circle at 50% 78%, rgba(168, 85, 247, 0.12), transparent 42%),
                linear-gradient(180deg, #020617 0%, #01030f 100%);
            background-attachment: fixed;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at center, rgba(251, 191, 36, 0.06), transparent 28%),
                radial-gradient(circle at center, rgba(96, 165, 250, 0.05), transparent 52%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background:
                repeating-linear-gradient(
                    120deg,
                    rgba(255,255,255,0.02) 0px,
                    rgba(255,255,255,0.02) 1px,
                    transparent 1px,
                    transparent 7px
                );
            pointer-events: none;
            opacity: 0.28;
            z-index: 0;
        }

        .glow-border {
            box-shadow:
                0 0 15px rgba(59, 130, 246, 0),
                inset 0 0 0 rgba(255, 255, 255, 0);
            transition: all 0.3s ease;
        }

        .glow-border:hover {
            box-shadow:
                0 0 25px rgba(59, 130, 246, 0.30),
                0 0 60px rgba(99, 102, 241, 0.12),
                inset 0 0 20px rgba(255, 255, 255, 0.03);
            border-color: #3b82f6;
            transform: translateY(-5px);
        }

        input[type="file"] {
            display: none;
        }

        #capture-area {
            background:
                linear-gradient(180deg, rgba(2, 6, 23, 0.94) 0%, rgba(3, 8, 30, 0.97) 100%);
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow:
                0 0 60px rgba(59, 130, 246, 0.12),
                0 0 120px rgba(79, 70, 229, 0.10),
                inset 0 0 40px rgba(255, 255, 255, 0.02);
            z-index: 1;
        }

        #capture-area::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(180deg, rgba(30, 41, 59, 0.20) 0%, rgba(15, 23, 42, 0.72) 100%);
            z-index: 0;
            pointer-events: none;
        }

        #capture-area::after {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at top center, rgba(251, 191, 36, 0.07), transparent 26%),
                radial-gradient(circle at bottom center, rgba(59, 130, 246, 0.05), transparent 30%);
            z-index: 0;
            pointer-events: none;
        }

        #capture-area > * {
            position: relative;
            z-index: 1;
        }

        .gradient-text {
            color: transparent;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .exporting .gradient-text {
            background: none !important;
            color: #fbbf24 !important;
            -webkit-text-fill-color: #fbbf24 !important;
        }

        .exporting .gradient-text-light {
            background: none !important;
            color: #e5e7eb !important;
            -webkit-text-fill-color: #e5e7eb !important;
        }

        .section-badge {
            backdrop-filter: blur(10px);
            background: rgba(15, 23, 42, 0.78);
            box-shadow:
                0 8px 24px rgba(0, 0, 0, 0.28),
                inset 0 0 10px rgba(255, 255, 255, 0.02);
        }

        .card-shell {
            background:
                linear-gradient(180deg, rgba(30, 41, 59, 0.86) 0%, rgba(23, 37, 62, 0.90) 100%);
            box-shadow:
                inset 0 0 0 1px rgba(255,255,255,0.04),
                0 10px 30px rgba(0,0,0,0.25);
        }

        .placeholder-icon-ring {
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.05),
                inset 0 0 10px rgba(255,255,255,0.03);
        }
    </style>
</head>
<body class="font-body text-gray-200 antialiased p-4 md:p-8 flex flex-col items-center">

    <div class="mb-8 flex flex-wrap gap-4 justify-center relative z-10" data-html2canvas-ignore>
        <button id="download-btn" onclick="downloadImage()" class="flex items-center gap-2 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white px-6 py-3 rounded-full font-semibold shadow-lg shadow-blue-500/30 transition-all transform hover:scale-105">
            <i data-lucide="download"></i>
            Download my Infographic
        </button>

        <button onclick="resetAll()" class="flex items-center gap-2 bg-slate-800/90 hover:bg-slate-700 border border-slate-600 text-white px-6 py-3 rounded-full font-semibold transition-all">
            <i data-lucide="refresh-cw"></i>
            Reset
        </button>
    </div>

    <div id="capture-area" class="w-full max-w-5xl rounded-3xl overflow-hidden p-8 md:p-12">
        <div class="text-center mb-12">
            <h1 class="gradient-text font-title text-4xl md:text-6xl font-black bg-gradient-to-r from-ygo-gold via-yellow-200 to-ygo-gold drop-shadow-sm mb-4 tracking-wider uppercase">
                My Favorite Cards
            </h1>
            <p class="text-slate-400 text-lg md:text-xl font-light tracking-[0.25em] uppercase">
                Yu-Gi-Oh! Challenge
            </p>
            <div class="h-1 w-32 bg-gradient-to-r from-transparent via-ygo-gold to-transparent mx-auto mt-6 opacity-60 rounded-full"></div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-10" id="card-grid"></div>

        <div class="mt-12 text-center text-slate-500 text-sm font-title tracking-widest">
            Duel Template crafted by <span class="text-ygo-gold font-bold">Kazuyoshi</span>
        </div>
    </div>

    <script>
        const categories = [
            { id: 'deck', title: 'Favorite Deck', color: 'from-purple-500 to-indigo-500' },
            { id: 'vanilla', title: 'Normal Monster', color: 'from-amber-100 to-yellow-400' },
            { id: 'effect', title: 'Effect Monster', color: 'from-orange-400 to-red-500' },
            { id: 'ritual', title: 'Ritual Monster', color: 'from-blue-400 to-cyan-400' },
            { id: 'fusion', title: 'Fusion Monster', color: 'from-purple-600 to-fuchsia-600' },
            { id: 'synchro', title: 'Synchro Monster', color: 'from-slate-100 to-gray-400' },
            { id: 'xyz', title: 'Xyz Monster', color: 'from-gray-700 to-black' },
            { id: 'pendulum', title: 'Pendulum Monster', color: 'from-emerald-400 to-teal-500' },
            { id: 'link', title: 'Link Monster', color: 'from-blue-600 to-blue-800' }
        ];

        const gridContainer = document.getElementById('card-grid');

        categories.forEach(cat => {
            const cardHTML = `
                <div class="flex flex-col items-center group relative">
                    <div class="section-badge relative z-10 -mb-4 border border-slate-700/70 px-6 py-2 rounded-full">
                        <h2 class="gradient-text gradient-text-light font-title font-bold text-sm md:text-base bg-gradient-to-r ${cat.color} tracking-wider uppercase text-center">
                            ${cat.title}
                        </h2>
                    </div>

                    <label for="upload-${cat.id}" class="card-shell w-full relative aspect-card rounded-2xl border-2 border-slate-700/50 glow-border cursor-pointer flex flex-col items-center justify-center overflow-hidden z-0">
                        <input type="file" id="upload-${cat.id}" accept="image/*" onchange="previewImage(event, 'img-${cat.id}', 'placeholder-${cat.id}')">

                        <div id="placeholder-${cat.id}" class="flex flex-col items-center justify-center text-slate-500 group-hover:text-blue-300 transition-colors p-6 text-center">
                            <div class="placeholder-icon-ring rounded-full p-2 mb-3">
                                <i data-lucide="plus-circle" class="w-12 h-12 opacity-50 group-hover:opacity-100 transition-opacity"></i>
                            </div>
                            <span class="text-sm font-medium">Click to add an image</span>
                        </div>

                        <img id="img-${cat.id}" src="" alt="${cat.title}" class="absolute inset-0 w-full h-full object-cover hidden rounded-xl p-1" />

                        <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                            <span class="bg-slate-900/90 text-white px-4 py-2 rounded-lg text-sm font-semibold border border-slate-700 flex items-center gap-2">
                                <i data-lucide="image" class="w-4 h-4"></i> Edit
                            </span>
                        </div>
                    </label>
                </div>
            `;
            gridContainer.insertAdjacentHTML('beforeend', cardHTML);
        });

        function refreshIcons() {
            lucide.createIcons();
        }

        function previewImage(event, imgId, placeholderId) {
            const input = event.target;

            if (input.files && input.files[0]) {
                const reader = new FileReader();

                reader.onload = function(e) {
                    const imgElement = document.getElementById(imgId);
                    const placeholderElement = document.getElementById(placeholderId);

                    imgElement.src = e.target.result;
                    imgElement.classList.remove('hidden');
                    placeholderElement.classList.add('hidden');
                };

                reader.readAsDataURL(input.files[0]);
            }
        }

        async function waitForVisibleImages(container) {
            const images = Array.from(container.querySelectorAll('img'))
                .filter(img => img.src && !img.classList.contains('hidden'));

            await Promise.all(
                images.map(img => {
                    if (img.complete && img.naturalWidth > 0) {
                        return Promise.resolve();
                    }

                    return new Promise(resolve => {
                        const done = () => resolve();
                        img.onload = done;
                        img.onerror = done;
                    });
                })
            );
        }

        async function downloadImage() {
            const element = document.getElementById('capture-area');
            const button = document.getElementById('download-btn');
            const originalText = button.innerHTML;

            try {
                button.innerHTML = '<i data-lucide="loader" class="animate-spin"></i> Generating...';
                refreshIcons();

                if (document.fonts && document.fonts.ready) {
                    await document.fonts.ready;
                }

                await waitForVisibleImages(element);

                element.classList.add('exporting');

                await new Promise(resolve => setTimeout(resolve, 120));

                const canvas = await html2canvas(element, {
                    scale: 2,
                    backgroundColor: '#020617',
                    useCORS: true,
                    logging: false,
                    foreignObjectRendering: false
                });

                element.classList.remove('exporting');

                const link = document.createElement('a');
                link.download = 'My-Favorite-YGO-Cards.png';
                link.href = canvas.toDataURL('image/png');
                link.click();

                button.innerHTML = originalText;
                refreshIcons();
            } catch (err) {
                element.classList.remove('exporting');
                console.error('Error during capture:', err);
                alert('An error occurred while generating the image.');
                button.innerHTML = originalText;
                refreshIcons();
            }
        }

        function resetAll() {
            if (confirm('Do you really want to remove all your cards?')) {
                categories.forEach(cat => {
                    const imgElement = document.getElementById(`img-${cat.id}`);
                    const placeholderElement = document.getElementById(`placeholder-${cat.id}`);
                    const input = document.getElementById(`upload-${cat.id}`);

                    imgElement.src = '';
                    imgElement.classList.add('hidden');
                    placeholderElement.classList.remove('hidden');
                    input.value = '';
                });
            }
        }

        refreshIcons();
    </script>
</body>
</html>
