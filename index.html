<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yu-Gi-Oh Favorite Cards Challenge</title>
    <meta name="description" content="Create and share your favorite Yu-Gi-Oh cards by category." />
    <meta
        http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; connect-src 'self' https://db.ygoprodeck.com; img-src 'self' data: https:; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none';"
    />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.468.0/dist/umd/lucide.min.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="./tailwind.css" />
    <link rel="stylesheet" href="./style.css" />
</head>
<body class="font-body text-gray-200 antialiased p-4 md:p-8 flex flex-col items-center">
    <div class="mb-8 flex flex-wrap gap-4 justify-center relative z-10" data-html2canvas-ignore>
        <button
            id="download-btn"
            class="flex items-center gap-2 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white px-6 py-3 rounded-full font-semibold shadow-lg shadow-blue-500/30 transition-all transform hover:scale-105"
        >
            <i data-lucide="download"></i>
            Download my Infographic
        </button>

        <button
            id="randomize-btn"
            class="flex items-center gap-2 bg-gradient-to-r from-fuchsia-600 to-violet-600 hover:from-fuchsia-500 hover:to-violet-500 text-white px-6 py-3 rounded-full font-semibold shadow-lg shadow-fuchsia-500/30 transition-all transform hover:scale-105"
        >
            <i data-lucide="shuffle"></i>
            Duel Roulette
        </button>

        <button
            id="reset-btn"
            class="flex items-center gap-2 bg-slate-800/90 hover:bg-slate-700 border border-slate-600 text-white px-6 py-3 rounded-full font-semibold transition-all"
        >
            <i data-lucide="refresh-cw"></i>
            Reset
        </button>
    </div>

    <div id="capture-area" class="w-full max-w-5xl rounded-3xl overflow-hidden p-8 md:p-12">
        <div class="text-center mb-12">
            <h1 class="gradient-text title-glow font-title text-4xl md:text-6xl font-black bg-gradient-to-r from-ygo-gold via-yellow-200 to-ygo-gold drop-shadow-sm mb-4 tracking-wider uppercase">
                My Favorite Cards
            </h1>
            <p class="text-slate-400 text-lg md:text-xl font-light tracking-[0.25em] uppercase">
                Yu-Gi-Oh! Challenge
            </p>
            <div class="h-1 w-32 bg-gradient-to-r from-transparent via-ygo-gold to-transparent mx-auto mt-6 opacity-60 rounded-full"></div>
        </div>

        <div
            id="status-banner"
            role="status"
            aria-live="polite"
            aria-atomic="true"
            class="hidden mb-8 rounded-2xl border border-slate-700/80 bg-slate-900/70 px-4 py-3 text-center text-sm text-slate-300"
        ></div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-10" id="card-grid"></div>

        <div class="mt-12 text-center text-slate-500 text-sm font-title tracking-widest">
            Duel Template crafted by <span class="text-ygo-gold font-bold">Kazuyoshi</span>
        </div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
